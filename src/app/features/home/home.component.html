<div class="p-6 max-w-7xl mx-auto">
  <div class="mb-8">
    <h1 class="text-white text-3xl font-bold">Discover Music</h1>
    <p class="text-muted mt-1">Explore public playlists from the community</p>
  </div>

  @if (loading()) {
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
      @for (i of skeletons; track i) {
        <div class="space-y-2">
          <app-skeleton height="160px" extraClass="rounded-xl" />
          <app-skeleton height="1rem" width="80%" />
          <app-skeleton height="0.75rem" width="60%" />
        </div>
      }
    </div>
  } @else {
    @if (items().length === 0) {
      <div class="text-center py-20">
        <p class="text-6xl mb-4">🎵</p>
        <p class="text-white text-xl font-semibold">No public playlists yet</p>
        <p class="text-muted mt-2">Be the first to share your music!</p>
      </div>
    } @else {
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
        @for (item of items(); track item.playlist.id) {
          <app-playlist-card
            [playlist]="item.playlist"
            [owner]="item.owner"
            [musicCount]="item.musicCount"
            (clicked)="onPlaylistClick($event)"
            (play)="onPlay($event)"
          />
        }
      </div>
    }
  }
</div>
