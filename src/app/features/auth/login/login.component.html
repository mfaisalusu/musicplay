<div class="min-h-screen bg-bg flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-9 h-9 text-black" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
      </div>
      <h1 class="text-white text-2xl font-bold">MusicPlay</h1>
      <p class="text-muted text-sm mt-1">Sign in to your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm text-muted mb-1.5">Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          class="w-full bg-surface-2 text-white rounded-lg px-4 py-3 text-sm border border-border focus:border-primary focus:outline-none transition-colors"
          [class.border-red-500]="isInvalid('email')"
        />
        @if (isInvalid('email')) {
          <p class="text-red-400 text-xs mt-1">Valid email is required</p>
        }
      </div>

      <div>
        <label class="block text-sm text-muted mb-1.5">Password</label>
        <div class="relative">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            class="w-full bg-surface-2 text-white rounded-lg px-4 py-3 pr-12 text-sm border border-border focus:border-primary focus:outline-none transition-colors"
            [class.border-red-500]="isInvalid('password')"
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-white transition-colors"
          >
            {{ showPassword() ? '🙈' : '👁️' }}
          </button>
        </div>
        @if (isInvalid('password')) {
          <p class="text-red-400 text-xs mt-1">Password is required</p>
        }
      </div>

      <div class="flex items-center gap-2">
        <input
          type="checkbox"
          id="remember"
          formControlName="remember"
          class="w-4 h-4 accent-primary rounded"
        />
        <label for="remember" class="text-sm text-muted cursor-pointer">Remember me</label>
      </div>

      @if (error()) {
        <p class="text-red-400 text-sm text-center bg-red-400/10 rounded-lg py-2 px-3">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full bg-primary hover:bg-primary-dark text-black font-bold py-3 rounded-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="text-center text-muted text-sm mt-6">
      Don't have an account?
      <a routerLink="/auth/register" class="text-primary hover:underline font-medium">Sign up</a>
    </p>

    <div class="mt-6 p-4 bg-surface rounded-lg border border-border text-xs text-muted">
      <p class="font-medium text-white mb-1">Demo accounts:</p>
      <p>john&#64;example.com / password123</p>
      <p>jane&#64;example.com / password123</p>
    </div>
  </div>
</div>
