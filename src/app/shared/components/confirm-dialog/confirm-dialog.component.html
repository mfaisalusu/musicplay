@if (store.dialog(); as dialog) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
    <div class="bg-surface rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-border">
      <h3 class="text-white font-semibold text-lg mb-2">{{ dialog.title }}</h3>
      <p class="text-muted text-sm mb-6">{{ dialog.message }}</p>
      <div class="flex gap-3 justify-end">
        <button
          (click)="store.cancel()"
          class="px-4 py-2 rounded-lg text-sm font-medium text-muted hover:text-white hover:bg-surface-3 transition-colors"
        >Cancel</button>
        <button
          (click)="store.confirm()"
          class="px-4 py-2 rounded-lg text-sm font-medium bg-red-600 hover:bg-red-700 text-white transition-colors"
        >{{ dialog.confirmText || 'Delete' }}</button>
      </div>
    </div>
  </div>
}
